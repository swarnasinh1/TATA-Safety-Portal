<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Submitted - TATA Safety Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.success-box{

background:white;
padding:40px;
border-radius:10px;
text-align:center;
width:500px;
box-shadow:0 4px 10px rgba(0,0,0,.1);

}

.check{

font-size:70px;
margin-bottom:15px;

}

h1{

color:#005BAC;
margin-bottom:15px;

}

p{

color:#555;
margin-bottom:10px;

}

.report-id{

font-size:22px;
font-weight:bold;
color:#005BAC;
margin:20px 0;

}

.btn{

display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#005BAC;
color:white;
text-decoration:none;
border-radius:5px;

}

.btn:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="success-box">

<div class="check">✅</div>

<h1>Report Submitted Successfully</h1>

<p>Your safety incident has been recorded successfully.</p>

<div class="report-id">

Report ID: {{ report_id }}

</div>

<p>The safety team will review the incident shortly.</p>

<a href="/dashboard" class="btn">

Back to Dashboard

</a>

</div>

</body>
</html>
