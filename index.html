<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATA Safety Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #005BAC;
            color: white;
            padding: 20px;
        }

        main {
            padding: 60px 20px;
        }

        h2 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .button-container {
            margin-top: 30px;
        }

        .button-container a {
            text-decoration: none;
        }

        .button-container button {
            background-color: #005BAC;
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .button-container button:hover {
            opacity: 0.9;
        }

        footer {
            margin-top: 80px;
            padding: 15px;
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>TATA Safety Portal</h1>
    </header>

    <main>
        <h2>Welcome to TATA Safety Portal</h2>
        <p>
            Report, monitor, and manage workplace safety incidents efficiently.
        </p>

        <div class="button-container">
            <a href="login.html">
                <button>Login</button>
            </a>

            <a href="register.html">
                <button>Register</button>
            </a>
        </div>
    </main>

    <footer>
        <p>© 2026 TATA Safety Portal</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
