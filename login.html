<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATA Safety Portal - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
        }

        .login-container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:360px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#005BAC;
            margin-bottom:20px;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#005BAC;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            opacity:.9;
        }

        .register-link{
            text-align:center;
            margin-top:15px;
        }

        .register-link a{
            color:#005BAC;
            text-decoration:none;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h2>TATA Safety Portal</h2>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">

        <div class="input-group">
            <label>Employee ID</label>
            <input
                type="text"
                name="employeeid"
                id="employeeId"
                placeholder="Enter Employee ID"
                required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Enter Password"
                required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="register-link">
        Don't have an account?
        <a href="/register">Register</a>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
