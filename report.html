<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Incident</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#005BAC;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:850px;
margin:30px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#005BAC;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>TATA Safety Portal</h1>

</header>

<div class="container">

<h2>Safety Incident Report</h2>

<form action="/report" method="POST">

<div class="form-group">
<label>Employee Name</label>
<input type="text" id="employeeName" name="employeeName" required>
</div>

<div class="form-group">
<label>Employee ID</label>
<input type="text" id="employeeId" name="employeeId" required>
</div>

<div class="form-group">
<label>Department</label>
<input type="text" id="department" name="department" required>
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="incidentDate" name="incidentDate" required>
</div>

<div class="form-group">
<label>Time</label>
<input type="time" id="incidentTime" name="incidentTime" required>
</div>

<div class="form-group">
<label>Plant</label>

<select id="plant" name="plant" required>

<option value="">Select Plant</option>

<option>Tata Steel Jamshedpur</option>
<option>Tata Steel Kalinganagar</option>
<option>Tata Steel Meramandali</option>
<option>Tata Steel Gamharia</option>
<option>Tata Steel Sahibabad</option>
<option>Tata Steel Pantnagar</option>
<option>Tata Steel Pune</option>

</select>

</div>

<div class="form-group">
<label>Location</label>
<input type="text" id="location" name="location" required>
</div>

<div class="form-group">
<label>Incident Type</label>

<select id="incidentType" name="incidentType" required>

<option>Near Miss</option>
<option>Minor Injury</option>
<option>Major Injury</option>
<option>Equipment Damage</option>
<option>Fire Hazard</option>
<option>Unsafe Condition</option>

</select>

</div>

<div class="form-group">
<label>Severity</label>

<select id="severity" name="severity" required>

<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Critical</option>

</select>

</div>

<div class="form-group">
<label>Description</label>

<textarea
id="description"
name="description"
rows="5"
required></textarea>

</div>

<div class="form-group">
<label>Upload Evidence</label>
<input type="file">
</div>

<button type="submit">

Submit Report

</button>

</form>

</div>

</body>
</html>
